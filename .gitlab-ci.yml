stages:
  - quality
  - test
  - security

default:
  image: node:22-alpine
  before_script:
    - npm run install:all

lint:
  stage: quality
  script:
    - npm run lint

test:
  stage: test
  script:
    - npm run test
    - npm run coverage

dependency_audit:
  stage: security
  script:
    - npm run audit

secret_scan:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . --redact

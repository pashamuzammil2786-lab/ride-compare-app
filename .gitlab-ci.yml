stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

default:
  image: node:22-alpine
  before_script:
    - npm run install:all

lint:
  stage: lint
  script:
    - npm run lint

format:
  stage: format
  script:
    - npm run format

type_check:
  stage: type_check
  script:
    - npm run typecheck

test:
  stage: test
  script:
    - npm run test

coverage:
  stage: coverage
  script:
    - npm run coverage

dependency_audit:
  stage: security
  script:
    - npm audit --audit-level=high
    - npm run dependency:audit

secret_scan:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . --redact
